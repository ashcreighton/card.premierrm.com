  <script>
document.addEventListener("DOMContentLoaded", function() {
  // --- dynamic names ---
  var first = document.body.getAttribute("data-first") || "Dave";
  var last = document.body.getAttribute("data-last") || "Howard";
  var job = document.body.getAttribute("data-job") || "Title";
  var lowerFirst = first.toLowerCase();
  var lowerLast = last.toLowerCase();
  // --- Auto-open vCard for mobile ---
  var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  if (isMobile) {
    setTimeout(function() {
      window.location.href = "vcards/" + lowerFirst + lowerLast + ".vcf";
    }, 2500);
  }
  // --- Email ---
  var emailBtn = document.getElementById("email-btn");
  if (emailBtn) {
    emailBtn.href = "mailto:" + lowerFirst.charAt(0) + lowerLast + "@premierm.com";
  }
  // --- Profile picture ---
  var profileImg = document.getElementById("profile-img");
  if (profileImg) {
    profileImg.src = "images/headshots/" + lowerFirst + lowerLast + ".jpg";
    profileImg.alt = first + " " + last;
  }
  // --- Share button ---
  var shareBtn = document.getElementById("share-btn");
  shareBtn.addEventListener("click", function(e) {
    e.preventDefault(); // Prevent default link behavior
    var shareTitle = first + " " + last + "'s Digital Business Card";
    var shareText = "Tap the link to view " + first + "'s digital business card!";
    var shareUrl = window.location.href;
    if (navigator.share) {
      navigator.share({
        title: shareTitle,
        text: shareText,
        url: shareUrl
      }).catch(console.error);
    } else {
      navigator.clipboard.writeText(shareUrl)
        .then(() => alert('Link copied!'))
        .catch(console.error);
    }
  });
    // --- Update header name and job title ---
    var nameHeading = document.querySelector(".h2-name");
    if (nameHeading) {
      nameHeading.textContent = first + " " + last;
    }
    var jobHeading = document.querySelector(".heading-3");
    if (jobHeading) {
      jobHeading.textContent = job;
    }
});
</script>
